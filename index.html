
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Red Crown</title>

<link rel="icon" type="image/png" sizes="32x32" href="./images/crown.png?v=2">

<link rel="apple-touch-icon" href="./images/crown.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
body{
    margin:0;
    padding:0;
    font-family:"Book Antiqua", Palatino, serif;

    background-image: url("./images/paper.jpg");
    background-size: cover;
    background-attachment: fixed;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: flex-start;
}

#game{
    max-width:100%;
    display:flex;
    flex-direction:column;
    font-family:"Book Antiqua", Palatino, serif;
}

/* Sticky top bar */
.top-bar{
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* Scrollable content */
.map-content{
    flex: 1;
    overflow-y: auto;
}

/* Hide scrollbars but keep scrolling */
html,
body,
#game,
.map-content{
    -ms-overflow-style: none;  /* Internet Explorer / old Edge */
    scrollbar-width: none;     /* Firefox */
}

html::-webkit-scrollbar,
body::-webkit-scrollbar,
#game::-webkit-scrollbar,
.map-content::-webkit-scrollbar{
    display: none;             /* Chrome, Edge, Safari */
}

.hide-scrollbar {
    scrollbar-width: none;      /* Firefox */
    -ms-overflow-style: none;   /* IE/old Edge */
}

.hide-scrollbar::-webkit-scrollbar {
    display: none;              /* Chrome, Edge, Safari */
}

</style>

</head>

<body>

<div id="game"></div>

<script type="module" src="js/main.js"></script>

</body>

</html>
